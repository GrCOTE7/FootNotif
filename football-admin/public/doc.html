e data-lines=\"150,153\"><span class=\"hljs-attribute\">abcd efgh ijkl mnop</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"150,153"}},{"content":"<pre data-lines=\"154,155\"><code>Use this value for:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"154,155"}},{"content":"<pre data-lines=\"156,159\"><code data-lines=\"156,159\"><span class=\"hljs-attribute\">APP_PASSWORD</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"156,159"}},{"content":"<pre data-lines=\"160,161\"><code>in your `.env`.\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"160,161"}}],"payload":{"tag":"h3","lines":"128,129","fold":1}},{"content":"football-data API token","children":[{"content":"<pre data-lines=\"166,167\"><code>You also need an API token from:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"166,167"}},{"content":"<pre data-lines=\"168,171\"><code data-lines=\"168,171\"><span class=\"hljs-symbol\">https:</span>//football-data<span class=\"hljs-meta\">.org</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"168,171"}},{"content":"<pre data-lines=\"172,178\"><code>Steps:\n\n  1. Create a free account\n  2. Go to your dashboard\n  3. Copy your API key\n  4. Paste it into your root `.env`\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"172,178"}},{"content":"<pre data-lines=\"179,182\"><code data-lines=\"179,182\"><span class=\"hljs-attr\">API_TOKEN</span>=your_token_here\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"179,182"}}],"payload":{"tag":"h3","lines":"164,165","fold":1}}],"payload":{"tag":"h2","lines":"50,51","fold":1}},{"content":"Running the API","children":[{"content":"Start the backend API server","children":[{"content":"Env + API + API doc","children":[{"content":"<pre data-lines=\"189,192\"><code class=\"language-bash\">.venv/bin/python3 app.py\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"189,192"}},{"content":"<pre data-lines=\"193,194\"><code>The API will start on:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"193,194"}},{"content":"<pre data-lines=\"195,198\"><code class=\"language-bash\">http://127.0.0.1:YOUR_PORT\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"195,198"}},{"content":"<pre data-lines=\"199,202\"><code>Note: By default, YOUR_PORT = 8000\n\nHealth endpoint:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"199,202"}},{"content":"<pre data-lines=\"203,206\"><code class=\"language-php\">http:<span class=\"hljs-comment\">//127.0.0.1:YOUR_PORT/health</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"203,206"}},{"content":"<pre data-lines=\"207,208\"><code>Doc API endpoint:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"207,208"}},{"content":"<pre data-lines=\"209,212\"><code class=\"language-php\">http:<span class=\"hljs-comment\">//127.0.0.1:YOUR_PORT/docs</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"209,212"}}],"payload":{"tag":"h4","lines":"187,188","fold":1}}],"payload":{"tag":"h3","lines":"185,186","fold":1}},{"content":"Admin Interface","children":[{"content":"<pre data-lines=\"215,223\"><code>FootNotif includes a React + Vite + TypeScript admin interface.\n\nIt allows you to:\n\n  &#x2705; view subscribers\n  &#x2705; manage subscriptions\n  &#x2705; search teams\n  &#x2705; trigger notifications manually\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"215,223"}}],"payload":{"tag":"h3","lines":"213,214","fold":1}}],"payload":{"tag":"h2","lines":"183,184","fold":1}},{"content":"Run the front admin interface","children":[{"content":"<pre data-lines=\"226,230\"><code class=\"language-bash\"><span class=\"hljs-built_in\">cd</span> football-admin\nnpm run dev\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"226,230"}},{"content":"<pre data-lines=\"231,232\"><code>The admin interface runs on:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":" ied emails\n  - number of notifications sent\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"270,280"}}],"payload":{"tag":"h3","lines":"262,263","fold":1}},{"content":"API endpoints overview","children":[{"content":"Base URL","children":[{"content":"<pre data-lines=\"285,288\"><code class=\"language-php\">http:<span class=\"hljs-comment\">//127.0.0.1:8000</span>\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"285,288"}}],"payload":{"tag":"h4","lines":"283,284","fold":1}},{"content":"Subscribers","children":[{"content":"<pre data-lines=\"291,292\"><code>List subscribers:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"291,292"}},{"content":"<pre data-lines=\"293,296\"><code class=\"language-bash\">GET /subscribers\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"293,296"}},{"content":"<pre data-lines=\"297,298\"><code>Create subscriber:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"297,298"}},{"content":"<pre data-lines=\"299,302\"><code class=\"language-bash\">POST /subscribers\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"299,302"}},{"content":"<pre data-lines=\"303,304\"><code>Delete subscriber:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"303,304"}},{"content":"<pre data-lines=\"305,308\"><code class=\"language-bash\">DELETE /subscribers/{email}\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"305,308"}},{"content":"<pre data-lines=\"309,310\"><code>List subscriber teams:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"309,310"}},{"content":"<pre data-lines=\"311,314\"><code class=\"language-bash\">GET /subscribers/{email}/teams\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"311,314"}}],"payload":{"tag":"h4","lines":"289,290","fold":1}},{"content":"Subscriptions","children":[{"content":"<pre data-lines=\"317,318\"><code>Create subscription:\n</code></pre>","children":[],"payload":{"tag":"pre","lines":"317,318"}},{"conte
